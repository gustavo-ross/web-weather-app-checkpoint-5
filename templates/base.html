<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Weather App - Previsão Climática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-image: url("{{ url_for('static', filename='assets/' + bg_image) }}");
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #F8FAFC;
        }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 40%); z-index: 1; }
        .content-wrapper { position: relative; z-index: 2; padding: 48px; }
        .glass-card { background: rgba(17, 24, 39, 0.85); border-radius: 8px; padding: 48px; width: 100%; }
        .state-empty { max-width: 448px; margin-top: 15vh; }
        .state-active { max-width: 832px; margin-top: 15vh; }
        .info-box { background: rgba(248, 250, 252, 0.05); border: 1px solid rgba(248, 250, 252, 0.15); border-radius: 16px; padding: 12px 16px; }
        .search-wrapper { background: rgba(248, 250, 252, 0.20); border: 1px solid rgba(248, 250, 252, 0.30); border-radius: 1000px; }
        .form-control::placeholder { color: rgba(248, 250, 252, 0.50); }
        .form-control:focus { box-shadow: none; }
        .btn-search { background: #0DCAF0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 4px; }
        .btn-search:hover { background: #0baccc; }
        .history-item:hover { background-color: rgba(0,0,0,0.05); }
        .logo-link:hover { opacity: 0.8; transition: opacity 0.2s; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <form id="historyForm" method="POST" action="/" style="display: none;">
        <input type="hidden" name="cidade" id="historyInput">
    </form>

    <div class="content-wrapper">
        <header class="mb-4">
            <a href="/" class="d-flex align-items-center gap-2 text-decoration-none text-white logo-link" style="width: fit-content;">
                <img src="{{ url_for('static', filename='assets/CloudSun.svg') }}" width="32" alt="Logo">
                <h1 class="fs-4 fw-bold mb-0">Weather App</h1>
            </a>
        </header>

        <!-- Aqui o Jinja2 vai injetar a tela de Home ou de Resultado -->
        {% block content %}{% endblock %}
    </div>
</body>
</html>
